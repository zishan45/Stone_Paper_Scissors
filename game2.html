<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Paper Scissors</title>
    <link rel="stylesheet" href="game2.css">
</head>
<body>
    <h1 id="heading">STONE PAPER SCISSORS</h1>
    <div class="choices" id="game">

        <div class="choice" id="stone">
            <img src="stone.png">
        </div>
        <div class="choice" id="paper">
            <img src="paper.png">
        </div>
        <div class="choice" id="scissors">
            <img src="scissors.png">
        </div>
        
    </div>

    <div class="score-board">
        <div class="score" id="user-score">
            <p id="user-win-score">0</p>

            <p style="font-size: 20px;">YOU</p>
        </div>
       
        <div class="score" id="computer-score">
            <p id="computer-win-score">0</p>

            <P style="font-size: 20px;">COMPUTER</P>
        </div>
    </div>
    
    <div class="msg-container">
        <p>PLAY YOUR MOVE.</p>
    </div>



</body>

<script src="game2.js"></script>
</html>
